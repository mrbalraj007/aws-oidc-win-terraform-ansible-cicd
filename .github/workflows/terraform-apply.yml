name: Terraform Create

on:
  push:
    branches: [ main ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_key_name: ${{ secrets.TF_VAR_key_name }}
      TF_VAR_ansible_windows_password: ${{ secrets.TF_VAR_ansible_windows_password }}
      TF_VAR_tf_state_bucket: ${{ secrets.TF_VAR_tf_state_bucket }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.x

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_VAR_tf_state_bucket }}" \
            -backend-config="key=terraform-ansible-cicd/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true" 

      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve -input=false

      - name: Get Windows Public IP
        id: ip
        working-directory: ./terraform
        run: |
          echo "windows_public_ip=$(terraform output -raw windows_public_ip)" >> $GITHUB_OUTPUT

      - name: Save IP to file
        run: echo ${{ steps.ip.outputs.windows_public_ip }} > windows_public_ip.txt

      - name: Upload IP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-public-ip
          path: windows_public_ip.txt

          # this will be used in the Ansible workflow to connect to the Windows instance and run Ansible playbooks against it