name: Ansible Provision

on:
  workflow_run:
    workflows: ["Terraform Create"]
    types:
      - completed

jobs:
  ansible:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install boto3 botocore ansible

      - name: Download Windows Public IP artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-public-ip
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read Windows Public IP
        id: windows_ip
        run: |
          WINDOWS_IP=$(cat windows_public_ip.txt)
          echo "windows_ip=$WINDOWS_IP" >> $GITHUB_OUTPUT

      - name: Wait for WinRM to be available
        run: |
          ./scripts/04_wait_for_winrm.sh ${{ steps.windows_ip.outputs.windows_ip }}

      - name: Run Ansible Playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook -i ansible/inventories/aws_ec2_inventory.py ansible/playbooks/windows_setup.yml