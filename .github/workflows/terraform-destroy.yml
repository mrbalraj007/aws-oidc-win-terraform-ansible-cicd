name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm'
        required: true
        default: ''

jobs:
  terraform:
    if: ${{ github.event.inputs.confirm == 'destroy' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      TF_VAR_key_name: ${{ secrets.TF_VAR_key_name }}
      TF_VAR_ansible_windows_password: ${{ secrets.TF_VAR_ansible_windows_password }}
      TF_VAR_tf_state_bucket: ${{ secrets.TF_VAR_tf_state_bucket }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.x

      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_VAR_tf_state_bucket }}" \
            -backend-config="key=terraform-ansible-cicd/terraform.tfstate" \
            -backend-config="region=us-east-1" \
            -backend-config="encrypt=true" 

      - name: Terraform Destroy
        working-directory: ./terraform
        run: terraform destroy -auto-approve -input=false