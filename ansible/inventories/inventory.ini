# ansible/inventories/inventory.ini
# ----------------------------------
# Static fallback inventory — used only if dynamic script is bypassed.
# In CI/CD the dynamic script (aws_ec2_inventory.py) is used instead.

[windows]
# Hosts are populated dynamically via aws_ec2_inventory.py

[windows:vars]
ansible_connection=winrm
ansible_winrm_transport=basic
ansible_winrm_port=5985
ansible_winrm_scheme=http
ansible_winrm_server_cert_validation=ignore
