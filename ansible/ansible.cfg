# ansible/ansible.cfg
# --------------------
# Ansible configuration scoped to this project.
# Ansible reads this file when run from the ansible/ directory.

[defaults]
inventory           = inventories/aws_ec2_inventory.py
host_key_checking   = False
retry_files_enabled = False
stdout_callback     = yaml
timeout             = 60

# Reduce SSH/WinRM verbosity in CI logs
display_skipped_hosts = False

[winrm]
# Increase timeout for slow Windows boot
operation_timeout_sec  = 120
read_timeout_sec       = 150
